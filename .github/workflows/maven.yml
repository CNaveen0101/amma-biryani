name: myproject

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: mynewrunner

    steps:
    - name: Checkout code from Github
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install maven
      run: |
           sudo apt-get update -y
           sudo apt install maven default-jdk -y
        
    - name: Build with Maven
      run: mvn test

