# ===================================================================
# Amma Biryani - Vellore | Spring Boot Configuration
# ===================================================================

spring.application.name=amma-biryani-backend
server.port=8080

# -------------------------------------------------------------------
# LOCAL DEVELOPMENT: H2 in-memory database (no setup needed)
# Console available at http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:ammabiryani  |  user: sa  |  password: (blank)
# -------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:ammabiryani
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# -------------------------------------------------------------------
# PRODUCTION (AWS RDS - MySQL): comment out the H2 block above and
# uncomment this block. Never hardcode real credentials here - use
# environment variables (shown below) injected by EC2/ECS/Elastic
# Beanstalk, or AWS Secrets Manager.
# -------------------------------------------------------------------
# spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
# create-drop wipes data on every restart - fine for learning/demo.
# Switch to "update" once you have real customer/order data you want to keep.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File upload limits (for future menu image uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
